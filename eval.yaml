version: "1"

defaults:
  agent: gemini
  provider: docker
  trials: 1 # TODO increase trials
  timeout: 300
  threshold: 0.8 # For --ci mode
  grader_model: gemini-3-flash-preview # default LLM grader model
  docker:
    base: cicd-evals:latest
  env:
    GOOGLE_APPLICATION_CREDENTIALS: /tmp/keys/adc.json
  workspace:
    - src: scripts
      dest: /workspace/scripts
    - src: scripts/BASE_GEMINI.md
      dest: $HOME/.gemini/GEMINI.md
  environment:
    mounts:
      - ~/.config/gcloud/application_default_credentials.json:/tmp/keys/adc.json:ro
  trialConfig:
    setup: scripts/setup_gcloud.sh

tasks:

  # Evals for simple static site: https://github.com/sdlc-graph/tinyjam.git
  - name: deploy-static-site-gcs
    instruction: |
      Deploy this static application to Google Cloud.

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The bucket name should be constructed from gs://${_EVAL_UUID}-${_EVAL_TRIAL}.
          3. The region to use will be available as an environment variable $REGION.
        dest: /workspace/GEMINI.md

    trialConfig:
      setup: |
        git clone https://github.com/sdlc-graph/tinyjam.git
        cd tinyjam
        npm install
        npx . ./example ./example/_dist
      cleanup: scripts/teardown-gcs.sh gs://${_EVAL_UUID}-${_EVAL_TRIAL}

    agentWorkingDir: /workspace/tinyjam/example

    graders:
      - type: deterministic
        run: scripts/validate-gcs-deployment.sh gs://${_EVAL_UUID}-${_EVAL_TRIAL}
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-deploy
          - name: mcp_cicd_scan_code_for_secrets

  # Evals for deploying simple python application: https://github.com/sdlc-graph/chefs-companion
  - name: deploy-cloud-run-buildpacks-python
    instruction: |
      Deploy the python application to Cloud Run

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID. 
          2. The cloud run service name should be constructed from service-${_EVAL_UUID}-${_EVAL_TRIAL}.
          4. The region to use will be available as an environment variable $REGION.
          5. Use buildpacks for building and deploying the application.
        dest: /workspace/GEMINI.md

    timeout: 600

    trialConfig:
      setup: |
        git clone -b buildpacks https://github.com/sdlc-graph/chefs-companion.git
      cleanup: scripts/teardown-cloud-run.sh service-${_EVAL_UUID}-${_EVAL_TRIAL}

    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: scripts/validate-cloud-run-deployment.sh service-${_EVAL_UUID}-${_EVAL_TRIAL}
      - type: deterministic
        run: |
          if [ ! -f chefs-companion/Dockerfile ]; then
            echo '{"score": 1, "details": "Dockerfile does not exist"}'
          else
            echo '{"score": 0, "details": "Dockerfile exists"}'
          fi
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-deploy
          - name: mcp_cicd_deploy_cloudrun_service_from_source
          - name: mcp_cicd_scan_code_for_secrets
      - type: llm_rubric
        rubric: The agent must have used buildpacks to build the application

  # Evals for deploying simple python application: https://github.com/sdlc-graph/chefs-companion
  - name: deploy-cloud-run-no-dockerfile-python
    instruction: |
      Deploy the python application to Cloud Run

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The cloud run service name should be constructed from service-${_EVAL_UUID}-${_EVAL_TRIAL}.
          3. The artifact registry to use will be available as an environment variable $ARTIFACT_REGISTRY.
          4. The region to use will be available as an environment variable $REGION.
          5. Build a customer docker image for the application.
        dest: /workspace/GEMINI.md

    timeout: 600

    trialConfig:
      setup: |
        git clone -b no-dockerfile https://github.com/sdlc-graph/chefs-companion.git
      cleanup: scripts/teardown-cloud-run.sh service-${_EVAL_UUID}-${_EVAL_TRIAL}

    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: scripts/validate-cloud-run-deployment.sh service-${_EVAL_UUID}-${_EVAL_TRIAL}
      - type: deterministic
        run: |
          if [ -f chefs-companion/Dockerfile ]; then
            echo '{"score": 1, "details": "Dockerfile exists"}'
          else
            echo '{"score": 0, "details": "Dockerfile does not exist"}'
          fi
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-deploy
          - name: mcp_cicd_deploy_cloudrun_service_from_image
          - name: mcp_cicd_scan_code_for_secrets
      - type: llm_rubric
        rubric: The agent must have used a custom docker image to build the application


  # Evals for pipeline design with Terraform
  - name: pipeline-design-terraform-trunk-based-simple
    
    instruction: |
      Design and implement a simple CI/CD pipeline for my application.

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The region to use will be available as an environment variable $REGION.
          3. The artifact registry to use will be available as an environment variable $ARTIFACT_REGISTRY.
          4. Use Terraform for implementation. 
          5. All Terraform vars should have defaults set to make it easier to validate later.
          6. Follow Trunk-Based Push-to-Deploy pattern.
          7. Cloud Run is the preferred deployment target.
          8. If you create a GCS bucket for Terraform state, the bucket name should be gs://tf-state-${_EVAL_UUID}-${_EVAL_TRIAL}.
          9. Do not apply terraform directly.
          10. Do not submit builds to Cloud Build directly.
          11. Assume a greenfield setup and define all necessary infrastructure for the pipeline in your Terraform code (e.g., Artifact Registry repository).
        dest: /workspace/GEMINI.md
      
    timeout: 600

    trialConfig:
      setup: git clone -b no-cloudbuild https://github.com/sdlc-graph/chefs-companion.git
      cleanup: scripts/teardown-gcs.sh gs://tf-state-${_EVAL_UUID}-${_EVAL_TRIAL}

    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: scripts/validate-cloudbuild-simple-pipeline.sh chefs-companion/cloudbuild.yaml
      - type: deterministic
        run: scripts/validate-terraform-simple-pipeline.sh chefs-companion/terraform
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-pipeline-design
          - name: activate_skill
            args:
              name: google-cicd-terraform
      - type: llm_rubric
        rubric: |
          1. The agent must have used Terraform to implement the pipeline.
          2. The agent must have used the trunk-based push-to-deploy pattern.
          3. The agent must have used Cloud Run as the deployment target.

  # Evals for deploying simple python application with canary strategy targeting GKE
  - name: release-orchestration-canary-gke
    instruction: |
      Design and create a Cloud Deploy delivery pipeline for the python application targeting GKE with a canary deployment strategy for the production environment.
      The pipeline should target both staging and prod environments, but only the prod target should use a canary strategy.

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The region to use will be available as an environment variable $REGION.
          3. The application name is chefs-companion.
          4. Define a delivery pipeline and targets for staging and prod in clouddeploy.yaml.
          5. The staging target should point to a GKE cluster named cluster-staging.
          6. The prod target should point to a GKE cluster named cluster-prod and use a canary strategy with percentages 25 and 75.
          7. The prod target requires service networking configuration with service name chefs-companion and deployment name chefs-companion.
          8. Validating the generated configuration files is sufficient. You do not need to apply the pipeline to GCP.
          9. Generate basic Kubernetes Deployment and Service manifests for the application.
        dest: /workspace/GEMINI.md

    timeout: 600

    trialConfig:
      setup: |
        git clone -b no-cloudbuild https://github.com/sdlc-graph/chefs-companion.git
    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: python3 scripts/validate-clouddeploy.py --runtime=gke --check-canary chefs-companion
      - type: deterministic
        run: python3 scripts/validate-skaffold.py --profiles=chefs-companion-staging,chefs-companion-prod chefs-companion
      - type: deterministic
        run: python3 scripts/validate-manifests-gke.py chefs-companion
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-release-orchestration
      - type: llm_rubric
        rubric: |
          1. The agent must have defined a delivery pipeline in clouddeploy.yaml.
          2. The agent must have defined staging and prod targets for GKE in clouddeploy.yaml.
          3. The agent must have configured a canary strategy for the prod target with percentages 25 and 75.
          4. The agent must have generated Kubernetes manifests.

  # Evals for deploying simple python application with multi-environment: https://github.com/sdlc-graph/chefs-companion
  - name: release-orchestration-multi-env-cloudrun
    instruction: |
      Design and create a Cloud Deploy delivery pipeline for the python application.
      The pipeline should target both staging and prod environments.

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The region to use will be available as an environment variable $REGION.
          3. The application name is chefs-companion.
          4. Define a delivery pipeline and targets for staging and prod in clouddeploy.yaml.
          5. The staging target should point to a Cloud Run service named service-staging.
          6. The prod target should point to a Cloud Run service named service-prod.
          7. Validating the generated configuration files is sufficient. You do not need to apply the pipeline to GCP.
          8. Configure the pipeline to automatically rollback on failure.
          9. Configure automatic promotion from staging to prod after successful deployment to staging.
        dest: /workspace/GEMINI.md

    timeout: 600

    trialConfig:
      setup: |
        git clone -b no-cloudbuild https://github.com/sdlc-graph/chefs-companion.git
    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: python3 scripts/validate-clouddeploy.py --runtime=run --check-automations chefs-companion
      - type: deterministic
        run: python3 scripts/validate-skaffold.py --profiles=chefs-companion-staging,chefs-companion-prod chefs-companion
      - type: deterministic
        run: python3 scripts/validate-manifests-cloudrun.py --services=service-staging,service-prod chefs-companion
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-release-orchestration
      - type: llm_rubric
        rubric: |
          1. The agent must have defined a delivery pipeline in clouddeploy.yaml.
          2. The agent must have defined staging and prod targets in clouddeploy.yaml.

  # Evals for deploying simple python application with multi-environment targeting GKE
  - name: release-orchestration-multi-env-gke
    instruction: |
      Design and create a Cloud Deploy delivery pipeline for the python application targeting GKE.
      The pipeline should target both staging and prod environments.

    workspace:
      - content: |
          1. The project id will be available as an environment variable $PROJECT_ID.
          2. The region to use will be available as an environment variable $REGION.
          3. The application name is chefs-companion.
          4. Define a delivery pipeline and targets for staging and prod in clouddeploy.yaml.
          5. The staging target should point to a GKE cluster named cluster-staging.
          6. The prod target should point to a GKE cluster named cluster-prod.
          7. Validating the generated configuration files is sufficient. You do not need to apply the pipeline to GCP.
          8. Generate basic Kubernetes Deployment and Service manifests for the application.
        dest: /workspace/GEMINI.md

    timeout: 600

    trialConfig:
      setup: |
        git clone -b no-cloudbuild https://github.com/sdlc-graph/chefs-companion.git
    agentWorkingDir: /workspace/chefs-companion

    graders:
      - type: deterministic
        run: python3 scripts/validate-clouddeploy.py --runtime=gke chefs-companion
      - type: deterministic
        run: python3 scripts/validate-skaffold.py --profiles=chefs-companion-staging,chefs-companion-prod chefs-companion
      - type: deterministic
        run: python3 scripts/validate-manifests-gke.py chefs-companion
      - type: tool_usage
        expectedTools:
          - name: activate_skill
            args:
              name: google-cicd-release-orchestration
      - type: llm_rubric
        rubric: |
          1. The agent must have defined a delivery pipeline in clouddeploy.yaml.
          2. The agent must have defined staging and prod targets for GKE in clouddeploy.yaml.
          3. The agent must have generated Kubernetes manifests.